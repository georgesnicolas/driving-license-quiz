<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>امتحان السوق النظري</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <h1>امتحان السوق النظري</h1>
      <div class="controls">
        <span id="progress" class="progress-badge">0 / 0</span>
        <label for="sectionFilter" class="sr-only">قسم الأسئلة</label>
        <select id="sectionFilter" class="select-control" aria-label="فلتر قسم الأسئلة">
          <option value="all">كل الأقسام</option>
        </select>
        <button id="loadAllBtn" class="btn btn-ghost" type="button">تحميل كل الأسئلة</button>
        <button id="resetBtn" class="btn btn-ghost" type="button">إعادة تعيين</button>
        <button id="finishBtn" class="btn btn-primary" type="button">إنهاء الامتحان</button>
      </div>
    </div>
  </header>

  <main id="quiz" class="quiz" aria-live="polite"></main>

  <div id="resultBar" class="result-bar hidden" role="status">
    <div class="result-bar-inner">
      <span id="resultText"></span>
      <button id="retryBtn" class="btn btn-primary" type="button">حاول مرة أخرى</button>
    </div>
  </div>

  <script src="questions.js"></script>
  <script src="quiz.js?v=7"></script>
</body>
</html>
